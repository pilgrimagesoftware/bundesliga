name: CI

concurrency: ci

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: 

env:
  CARGO_TERM_COLOR: always

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6.3.0
      with:
        node-version-file: .node-version

    - name: Build
      run: |
            pnpm install
            cargo tauri build --verbose
      
    - name: Run tests
      run: cargo test --verbose
